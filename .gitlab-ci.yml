image: ghcr.io/astral-sh/uv:python3.14-bookworm

##########################################
##########################################
## We have to set the following env vars
## in the admin interface :
## - AWS_DEFAULT_REGION
## - BUCKET_NAME
## - AWS_ACCESS_KEY_ID
## - AWS_SECRET_ACCESS_KEY

stages:
    - tests
    - integration_testing
    - profiling
    - benchmarks
    - deploy_docs

variables:
    # Keep uv's download/build cache inside the project so GitLab can cache it.
    UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

cache:
    paths:
        - .uv-cache

.system_deps: &system_deps
    - apt update
    - apt install -y libgl1-mesa-glx xvfb graphviz libgraphviz-dev xdg-utils libcairo2-dev libjpeg-dev libgif-dev

before_script:
    - *system_deps
    - uv sync --locked

tests:
    stage: tests
    script:
        - xvfb-run uv run pytest -v
        - xvfb-run uv run flake8 flatland tests examples benchmarks
        - xvfb-run uv run python benchmarks/run_all_examples.py
        - xvfb-run uv run python notebooks/run_all_notebooks.py

build_and_deploy_docs:
    stage: deploy_docs
    only:
        - master
    dependencies:
        - tests
    script:
        - echo "Bucket=${BUCKET_NAME}"
        - echo "AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}"
        - echo "CI_COMMIT_REF_SLUG=${CI_COMMIT_REF_SLUG}"
        - xvfb-run uv run python make_docs.py
        - uv run --with awscli aws s3 cp ./docs/_build/html/ s3://${BUCKET_NAME} --recursive
    environment:
        name: ${CI_COMMIT_REF_SLUG}
        url: http://${BUCKET_NAME}.s3-website.${AWS_DEFAULT_REGION}.amazonaws.com/

profiling:
    dependencies:
        - tests
    stage: profiling
    only:
        variables:
            - $BENCHMARKS_AND_PROFILING
    script:
        - xvfb-run uv run python benchmarks/profile_all_examples.py

benchmarks:
    dependencies:
        - tests
    stage: benchmarks
    only:
        variables:
            - $BENCHMARKS_AND_PROFILING
    script:
        - xvfb-run uv run python benchmarks/benchmark_all_examples.py

test_uv_setup:
    stage: integration_testing
    before_script:
        - *system_deps
    script:
        - xvfb-run bash getting_started/getting_started.sh
